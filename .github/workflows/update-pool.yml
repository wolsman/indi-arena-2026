name: Indi-Arena data-update

# Wanneer draait dit?
on:
  schedule:
    # Cron staat in UTC. Tijdens het toernooi elk uur, zodat de stand kort
    # na elke wedstrijd meeloopt. (De stand kan nooit verser zijn dan
    # wkpooltjes zelf — die verwerkt uitslagen op zijn eigen tempo.)
    - cron: '0 * * * *'
  # Handmatig starten kan altijd via de "Run workflow"-knop in GitHub.
  workflow_dispatch:

# De job mag terugschrijven naar de repo (de bijgewerkte data committen).
permissions:
  contents: write

# Geen twee runs tegelijk.
concurrency:
  group: pool-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo uitchecken
        uses: actions/checkout@v4

      - name: Node.js installeren (met npm-cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Playwright-browser uit cache halen
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Dependencies installeren
        run: npm ci || npm install

      - name: Chromium installeren (browser uit cache, alleen OS-libs vers)
        run: npx playwright install --with-deps chromium

      - name: Data ophalen van wkpooltjes
        env:
          WKPOOL_EMAIL: ${{ secrets.WKPOOL_EMAIL }}
          WKPOOL_PASSWORD: ${{ secrets.WKPOOL_PASSWORD }}
        run: npm run scrape

      - name: Wijzigingen committen + Vercel laten deployen
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          git config user.name  "indi-arena-bot"
          git config user.email "indi-arena-bot@users.noreply.github.com"
          if git diff --quiet -- data/pool-data.js; then
            echo "Geen wijzigingen in de stand — niets te committen."
          else
            git add data/pool-data.js
            git commit -m "Auto-update poulestand $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Stand bijgewerkt en gepusht."
            # Vercel deployt commits van de bot niet automatisch; daarom
            # vuren we hier zelf een productie-deploy af via de deploy hook.
            if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
              echo "Vercel-deploy afvuren…"
              curl -sS -X POST "$VERCEL_DEPLOY_HOOK" && echo "  ✓ deploy getriggerd"
            else
              echo "  ⚠ Secret VERCEL_DEPLOY_HOOK ontbreekt — site wordt niet automatisch live gezet."
            fi
          fi
