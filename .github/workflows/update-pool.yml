name: Indi-Arena data-update

# Wanneer draait dit?
on:
  schedule:
    # Cron staat in UTC. Tijdens het toernooi elk uur, zodat de stand kort
    # na elke wedstrijd meeloopt. (De stand kan nooit verser zijn dan
    # wkpooltjes zelf — die verwerkt uitslagen op zijn eigen tempo.)
    - cron: '0 * * * *'
  # Handmatig starten kan altijd via de "Run workflow"-knop in GitHub.
  workflow_dispatch:

# De job mag terugschrijven naar de repo (de bijgewerkte data committen).
permissions:
  contents: write

# Geen twee runs tegelijk.
concurrency:
  group: pool-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo uitchecken
        uses: actions/checkout@v4

      - name: Node.js installeren (met npm-cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Playwright-browser uit cache halen
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Dependencies installeren
        run: npm ci || npm install

      - name: Chromium installeren (browser uit cache, alleen OS-libs vers)
        run: npx playwright install --with-deps chromium

      - name: Data ophalen van wkpooltjes
        env:
          WKPOOL_EMAIL: ${{ secrets.WKPOOL_EMAIL }}
          WKPOOL_PASSWORD: ${{ secrets.WKPOOL_PASSWORD }}
        run: npm run scrape

      - name: Wijzigingen committen
        id: commit
        run: |
          git config user.name  "indi-arena-bot"
          git config user.email "indi-arena-bot@users.noreply.github.com"
          if git diff --quiet -- data/pool-data.js; then
            echo "Geen wijzigingen in de stand — niets te committen."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add data/pool-data.js
            git commit -m "Auto-update poulestand $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Stand bijgewerkt en gepusht."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Vercel zet commits van de bot niet betrouwbaar live op het
      # productiedomein. Daarom deployen we hier zelf via de Vercel-CLI
      # met --prod — exact de methode die het domein wél bijwerkt.
      - name: Live zetten op Vercel (productie)
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_fPR124nS3FHhwzjGH2fbWHrt
          VERCEL_PROJECT_ID: prj_2F4KhtTZ1Cm9xVW28qxnxwcqHBe2
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "  ⚠ Secret VERCEL_TOKEN ontbreekt — site wordt niet automatisch live gezet."
            exit 0
          fi
          # Officiele CI-flow: lokaal bouwen + prebuilt uploaden. Een gewone
          # remote 'vercel deploy' bleef op status UNKNOWN hangen en kreeg het
          # productiedomein niet; prebuilt wordt wel READY en krijgt de alias.
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel build --prod --token "$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
          echo "  ✓ live gezet op productie"
