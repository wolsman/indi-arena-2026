<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />
<title>Indi-Arena 2026 · toegang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: {
          ink: '#0a0e1a', ink2: '#0f1525',
          line: '#22304d',
          oranje: '#ff6b00', oranje2: '#ff8a2a',
          veld: '#0eb84a', goud: '#ffd700', rood: '#ff3b5c'
        }
      }
    }
  }
</script>
<style>
  body {
    background-color:#0a0e1a;
    /* Indicium-teamposter met donkere overlay voor leesbaarheid */
    background-image:
      linear-gradient(rgba(10,14,26,.66), rgba(10,14,26,.82)),
      url('assets/indicium-team.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }
  .mesh::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:-1;
    background:
      radial-gradient(circle at 25% 25%, rgba(255,107,0,.15) 0%, transparent 50%),
      radial-gradient(circle at 75% 75%, rgba(14,184,74,.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,215,0,.05) 0%, transparent 60%);
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .float { animation: float 4s ease-in-out infinite; }
  .err { animation: shake .35s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
</style>
</head>
<body class="text-white font-sans antialiased min-h-screen flex items-center justify-center px-4 mesh">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8 float">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-oranje to-veld grid place-items-center font-black text-ink text-xl shadow-lg shadow-oranje/30">IA</div>
      </div>
      <h1 class="text-2xl font-black tracking-tight">Indi-Arena <span class="text-oranje">2026</span></h1>
      <p class="text-sm text-white/50 mt-1">Live cockpit · Indicium WK Poule</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl bg-ink2/80 backdrop-blur border border-line p-7 shadow-2xl">
      <div class="text-[11px] uppercase tracking-widest text-oranje font-bold mb-2">Besloten toegang</div>
      <h2 class="text-xl font-bold mb-1">Voer het pool-wachtwoord in</h2>
      <p class="text-sm text-white/60 mb-6">Het wachtwoord staat in de mail die je hebt ontvangen.</p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-white/50 mb-2">Wachtwoord</label>
          <input
            id="pwd"
            type="password"
            autocomplete="current-password"
            class="w-full px-4 py-3 rounded-xl bg-ink border border-line focus:border-oranje focus:outline-none transition font-mono text-base"
            placeholder="••••••••••••"
            required
          />
        </div>
        <button type="submit" class="w-full py-3 rounded-xl bg-oranje text-ink font-bold hover:bg-oranje2 transition">
          Open de Arena →
        </button>
      </form>

      <div id="err" class="hidden mt-4 px-4 py-3 rounded-xl bg-rood/15 border border-rood/30 text-rood text-sm font-medium">
        Onjuist wachtwoord. Kijk in de aankondigingsmail of vraag het even aan Dennis.
      </div>
    </div>

    <div class="text-center mt-8 text-xs text-white/40">
      Geen wachtwoord? Stuur een DM aan <span class="text-oranje font-semibold">Dennis</span>.
    </div>
  </div>

<script>
  // Het wachtwoord staat in een light obfuscation (base64).
  // Voor productie security is dit niet voldoende, maar voor een gesloten
  // kantoorpool van 46 mensen prima.
  // ↓ huidig wachtwoord (klein-letter):
  const PWD_HASH = btoa('indiciumwkpoule2026');

  const form = document.getElementById('loginForm');
  const err  = document.getElementById('err');
  const pwd  = document.getElementById('pwd');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = pwd.value.trim().toLowerCase();
    if (btoa(val) === PWD_HASH) {
      // Set auth flag
      localStorage.setItem('indi-arena-auth', '1');
      // Set expiry: 30 days from now
      const expires = Date.now() + 30 * 24 * 60 * 60 * 1000;
      localStorage.setItem('indi-arena-auth-exp', String(expires));
      // Redirect
      window.location.href = './';
    } else {
      err.classList.remove('hidden');
      pwd.classList.add('err');
      setTimeout(() => pwd.classList.remove('err'), 400);
      pwd.select();
    }
  });

  // Already authed? redirect immediately
  if (localStorage.getItem('indi-arena-auth') === '1') {
    const exp = +(localStorage.getItem('indi-arena-auth-exp') || 0);
    if (exp > Date.now()) {
      window.location.href = './';
    } else {
      localStorage.removeItem('indi-arena-auth');
      localStorage.removeItem('indi-arena-auth-exp');
    }
  }

  // Autofocus
  setTimeout(() => pwd.focus(), 100);
</script>
</body>
</html>
